<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>上反射 タイミング計算機</title>
  <style>
    :root {
      --bg-color: #0d0204;
      --panel-bg: #140508;
      --border-color: #ff1e56;
      --text-color: #ffffff;
      --text-muted: #ffa3b6;
      --shadow-color: rgba(255, 30, 86, 0.4);
      --voice-active: #00ffcc;
    }

    * {
      box-sizing: border-box;
      font-family: 'Consolas', 'Courier New', monospace, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 15px;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .wrapper {
      width: 100%;
      max-width: 440px;
      margin-top: 10px;
    }

    .panel {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      padding: 20px 15px;
      position: relative;
      box-shadow: 0 0 15px var(--shadow-color);
    }

    .panel::before, .panel::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      border: 2px solid var(--border-color);
    }
    .panel::before {
      top: -1px;
      left: -1px;
      border-right: none;
      border-bottom: none;
    }
    .panel::after {
      bottom: -1px;
      right: -1px;
      border-left: none;
      border-top: none;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--text-color);
      text-shadow: 0 0 8px var(--border-color);
    }

    .header .sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 5px;
      letter-spacing: 1px;
    }

    /* 音声コントロール用スタイル */
    .voice-control {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px dashed rgba(255, 30, 86, 0.3);
      padding-bottom: 15px;
    }

    .voice-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: bold;
      padding: 12px 0;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.1s;
    }

    .voice-btn#voice-start.listening {
      background: rgba(0, 255, 204, 0.15);
      border-color: var(--voice-active);
      color: var(--voice-active);
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
    }

    .voice-status {
      grid-column: span 2;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 5px;
      height: 15px;
    }

    .label {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-align: left;
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
    }

    .label::before {
      content: "▶ ";
      color: var(--border-color);
    }
    
    .label .sub-counter {
      font-size: 0.75rem;
      color: var(--border-color);
      font-weight: normal;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .input-with-btn {
      display: flex;
      gap: 8px;
    }

    input[type="number"] {
      width: 100%;
      background: #000000;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      font-size: 1.3rem;
      padding: 10px;
      text-align: center;
      outline: none;
    }

    input[type="number"]:focus {
      background: #1f050b;
      box-shadow: 0 0 10px var(--border-color);
    }

    input::placeholder {
      color: rgba(255, 163, 182, 0.3);
    }

    .segment-control {
      display: flex;
      border: 1px solid var(--border-color);
      background: #000000;
    }

    .segment-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      padding: 12px 0;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.1s;
    }

    .segment-btn:not(:last-child) {
      border-right: 1px solid var(--border-color);
    }

    .segment-btn.active {
      background: var(--border-color);
      color: #000000;
      text-shadow: none;
    }

    .action-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--border-color);
      font-size: 1rem;
      font-weight: bold;
      padding: 0 15px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .action-btn:active {
      background: var(--border-color);
      color: #000000;
    }

    .reset-btn-wrapper {
      margin-top: 25px;
      text-align: center;
    }

    .reset-btn {
      width: 100%;
      background: rgba(255, 30, 86, 0.1);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      font-size: 1.1rem;
      font-weight: bold;
      padding: 12px 0;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.1s;
    }

    .reset-btn:active {
      background: var(--border-color);
      color: #000000;
    }

    .result-box {
      margin-top: 25px;
      border: 1px solid var(--border-color);
      background: rgba(255, 30, 86, 0.05);
      padding: 15px;
      text-align: center;
      box-shadow: inset 0 0 15px rgba(255, 30, 86, 0.1);
    }

    .result-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .result-value {
      font-size: 3.2rem;
      font-weight: bold;
      color: var(--text-color);
      text-shadow: 0 0 12px var(--border-color), 0 0 25px var(--border-color);
      line-height: 1;
      margin: 10px 0;
    }

    .bottom-space {
      height: 20px;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="panel">
    
    <div class="header">
      <h1>TIMING COMPUTER</h1>
      <div class="sub">SYSTEM VERSION 3.0 // VOICE HYBRID</div>
    </div>

    <!-- 音声コントロールボタン -->
    <div class="voice-control">
      <button id="voice-start" class="voice-btn" onclick="startVoiceRecognition()">VOICE START</button>
      <button id="voice-stop" class="voice-btn" onclick="stopVoiceRecognition()">VOICE STOP</button>
      <div id="voice-status" class="voice-status">VOICE SYSTEM: STANDBY</div>
    </div>

    <!-- 表面入力 -->
    <div class="form-group">
      <div class="label"><div>表面：落とした秒数 / 突破秒数</div></div>
      <div class="grid-3">
        <input type="number" id="input1" inputmode="decimal" step="0.01" oninput="calculate(false)" placeholder="0.00">
        <input type="number" id="input2" inputmode="decimal" step="0.01" oninput="calculate(false)" placeholder="0.00">
        <input type="number" id="input3" inputmode="decimal" step="0.01" oninput="calculate(false)" placeholder="0.00">
      </div>
    </div>

    <!-- 突破球数選択 -->
    <div class="form-group">
      <div class="label"><div>突破球数</div></div>
      <div class="segment-control">
        <button class="segment-btn" id="mode1" onclick="changeMode(1)">1球</button>
        <button class="segment-btn active" id="mode2" onclick="changeMode(2)">2球</button>
        <button class="segment-btn" id="mode3" onclick="changeMode(3)">3球</button>
      </div>
      <input type="hidden" id="mode" value="2">
    </div>

    <!-- 裏面：狙う球数 -->
    <div class="form-group">
      <div class="label"><div>裏面：狙う球数</div></div>
      <div class="segment-control">
        <button class="segment-btn active" id="target_n1" onclick="changeTargetN(1)">1</button>
        <button class="segment-btn" id="target_n2" onclick="changeTargetN(2)">2</button>
        <button class="segment-btn" id="target_n3" onclick="changeTargetN(3)">3</button>
        <button class="segment-btn" id="target_n4" onclick="changeTargetN(4)">4</button>
        <button class="segment-btn" id="target_n5" onclick="changeTargetN(5)">5</button>
      </div>
      <input type="hidden" id="n" value="1">
    </div>

    <!-- 裏面：ロス秒数 -->
    <div class="form-group">
      <div class="label">
        <div>裏面：ロス秒数</div>
        <div class="sub-counter" id="accumulated-display">STOCKED: 0.00s</div>
      </div>
      <div class="input-with-btn">
        <input type="number" id="w" inputmode="decimal" step="0.01" oninput="calculate(false)" placeholder="0.00">
        <button class="action-btn" onclick="addLoss()">+ADD</button>
      </div>
    </div>

    <!-- 計算結果 -->
    <div class="result-box">
      <div class="result-title">TARGET TIMING</div>
      <div class="result-value" id="output">0.00 秒</div>
    </div>

    <!-- オールリセット -->
    <div class="reset-btn-wrapper">
      <button class="reset-btn" onclick="allReset()">ALL RESET</button>
    </div>

    <div class="bottom-space"></div>
  </div>
</div>

<script>
  let accumulatedLoss = 0.0;
  
  // 音声システム用のカウント変数
  let frontSpeakCount = 0;
  let isVoiceActive = false;

  // 音声認識のセットアップ（主要ブラウザ対応）
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.interimResults = false; // 確定した結果だけ取得
    recognition.continuous = true;      // STOPが押されるまで連続で聴き取る

    recognition.onresult = function(event) {
      const lastIndex = event.results.length - 1;
      const speechText = event.results[lastIndex][0].transcript.trim();
      document.getElementById('voice-status').innerHTML = "HEARD: \"" + speechText + "\"";
      parseSpeech(speechText);
    };

    recognition.onend = function() {
      if (isVoiceActive) {
        recognition.start(); // 予期せず切れた場合は自動で再スタート
      } else {
        document.getElementById('voice-status').innerHTML = "VOICE SYSTEM: STANDBY";
        document.getElementById('voice-start').classList.remove('listening');
      }
    };

    recognition.onerror = function() {
      if (isVoiceActive) document.getElementById('voice-status').innerHTML = "ERROR: TRY SPEAKING AGAIN";
    };
  } else {
    document.getElementById('voice-status').innerHTML = "VOICE NOT SUPPORTED ON THIS BROWSER";
    document.getElementById('voice-start').style.display = 'none';
    document.getElementById('voice-stop').style.display = 'none';
  }

  // 音声認識スタート
  function startVoiceRecognition() {
    if (!recognition) return;
    isVoiceActive = true;
    document.getElementById('voice-start').classList.add('listening');
    document.getElementById('voice-status').innerHTML = "VOICE SYSTEM: LISTENING...";
    recognition.start();
    speakText("音声入力を開始します");
  }

  // 音声認識ストップ
  function stopVoiceRecognition() {
    if (!recognition) return;
    isVoiceActive = false;
    document.getElementById('voice-start').classList.remove('listening');
    recognition.stop();
    speakText("音声入力を終了します");
  }

  // 声のテキストを解析するロジック
  function parseSpeech(text) {
    // 全角数字や「てん」を半角のドット数値に正規化
    let normalized = text.toLowerCase()
      .replace(/点|てん/g, '.')
      .replace(/[０-９]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
      })
      .replace(/ー|〜/g, '');

    // 数字部分を抽出する正規表現
    const numberMatch = normalized.match(/\d+(\.\d+)?/);
    
    if (!numberMatch) {
      speakText("もういちど");
      return;
    }

    const value = parseFloat(numberMatch[0]);

    if (normalized.includes("表") || normalized.includes("おもて")) {
      frontSpeakCount++;
      if (frontSpeakCount === 1) {
        document.getElementById('input1').value = value.toFixed(2);
        changeMode(1);
      } else if (frontSpeakCount === 2) {
        document.getElementById('input2').value = value.toFixed(2);
        changeMode(2);
      } else {
        document.getElementById('input3').value = value.toFixed(2);
        changeMode(3);
      }
    } 
    else if (normalized.includes("裏") || normalized.includes("うら")) {
      // 1回目の「裏」➔ 狙う球数を2に。2回目 ➔ 3に。（言った回数+1）
      const currentN = parseInt(document.getElementById('n').value) || 1;
      if (currentN < 5) {
        changeTargetN(currentN + 1);
      }
      // ロス秒数に代入してADDを実行
      document.getElementById('w').value = value;
      addLoss(true); // 音声からの呼び出し時は中身でcalculate(true)が走る
    } 
    else {
      // キーワード「表」「裏」が含まれなかった場合
      speakText("もういちど");
    }
  }

  // 音声合成（Siri風フィードバック）
  function speakText(msg) {
    if (!window.speechSynthesis) return;
    // 前の再生を止めて即座に喋らせる
    window.speechSynthesis.cancel();
    const uttr = new SpeechSynthesisUtterance(msg);
    uttr.lang = 'ja-JP';
    uttr.rate = 1.2; // 少し早口で実戦向きに
    window.speechSynthesis.speak(uttr);
  }

  // 突破球数切り替え
  function changeMode(val) {
    document.getElementById('mode').value = val;
    for (let i = 1; i <= 3; i++) {
      document.getElementById('mode' + i).classList.toggle('active', i === val);
    }
    calculate(false);
  }

  // 裏面：狙う球数切り替え
  function changeTargetN(val) {
    document.getElementById('n').value = val;
    for (let i = 1; i <= 5; i++) {
      document.getElementById('target_n' + i).classList.toggle('active', i === val);
    }
    calculate(false);
  }

  // ロス秒数追加
  function addLoss(isFromVoice = false) {
    const currentInput = parseFloat(document.getElementById('w').value) || 0.0;
    accumulatedLoss += currentInput;
    document.getElementById('accumulated-display').innerHTML = "STOCKED: " + accumulatedLoss.toFixed(2) + "s";
    document.getElementById('w').value = "";
    
    // 音声からのADD要求なら音声返答付きで計算、手動なら通常の計算
    calculate(isFromVoice);
  }

  // 全リセット
  function allReset() {
    document.getElementById('input1').value = "";
    document.getElementById('input2').value = "";
    document.getElementById('input3').value = "";
    document.getElementById('w').value = "";
    
    accumulatedLoss = 0.0;
    frontSpeakCount = 0;
    document.getElementById('accumulated-display').innerHTML = "STOCKED: 0.00s";
    
    changeMode(2);
    changeTargetN(1);
    
    calculate(false);
  }

  // メイン計算（引数 shouldSpeak が true の時だけ音声回答する）
  function calculate(shouldSpeak = false) {
    const num1 = parseFloat(document.getElementById('input1').value) || 0;
    const num2 = parseFloat(document.getElementById('input2').value) || 0;
    const num3 = parseFloat(document.getElementById('input3').value) || 0;
    const mode = parseInt(document.getElementById('mode').value) || 2;
    const n = parseInt(document.getElementById('n').value) || 1;
    
    const currentWInput = parseFloat(document.getElementById('w').value) || 0;
    const totalW = accumulatedLoss + currentWInput;

    const S = num1 + num2 + num3;

    let t_base;
    if (mode === 1) t_base = 3.0;
    else if (mode === 2) t_base = 4.5;
    else if (mode === 3) t_base = 6.0;
    else t_base = 4.5;

    let t = (t_base - S) % 10;
    if (t < 0) t += 10;

    let t2 = t + 1.5 * (n - 1) - totalW;
    t2 = ((t2 % 10) + 10) % 10;

    const t2_display = t2.toFixed(2);
    document.getElementById('output').innerHTML = t2_display + " 秒";

    // 音声認識経由での計算完了時のみ、結果を簡潔に発声
    if (shouldSpeak) {
      speakText(t2_display + "秒です");
    }
  }

  calculate(false);
</script>
</body>
</html>
